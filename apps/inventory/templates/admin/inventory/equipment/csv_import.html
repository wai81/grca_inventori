{% extends "admin/base_site.html" %}

{% block content %}
    <h1>Импорт оборудования из CSV</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <fieldset class="module aligned">
            {{ form.as_p }}
        </fieldset>
        <div class="submit-row">
            <input type="submit" value="Загрузить и показать предпросмотр" class="default">
        </div>
    </form>
{% endblock %}
