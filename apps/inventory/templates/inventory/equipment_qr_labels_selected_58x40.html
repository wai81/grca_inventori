<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Этикетки 58x40</title>
    <style>
        @page {
            size: A4 portrait;
            margin: 8mm;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: DejaVu Sans, Arial, sans-serif;
        }

        .sheet {
            width: 100%;
        }

        .label {
            box-sizing: border-box;
            width: 60mm;
            height: 30mm;
            padding: 2mm;
            display: grid;
            border: 0.4mm solid #000;
            margin: 0 2mm 2mm 0;
            grid-template-columns: 22mm 1fr;
            column-gap: 2mm;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .org {
            font-size: 9px;
            line-height: 1.1;
            font-weight: 700;
            margin-bottom: 2mm;
        }

        .qr-box {
            width: 20mm;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .qr-box img {
            width: 22mm;
            height: 22mm;
            display: block;
        }

        .pk {
            margin-top: 1mm;
            font-size: 9px;
            line-height: 1;
            text-align: center;
        }

        .inv {
            font-size: 9px;
            line-height: 1.1;
            margin-top: 2mm;
            font-weight: 700;
        }

        .t2 {
            font-size: 7.5pt;
            line-height: 1.15;
            margin-top: 1mm;

        }

        .muted {
            color: #333;
        }


    </style>
</head>
<body>
<div class="sheet">
    {% for object in objects %}
        <div class="label">
            <div class="qr-box">
                <img src="{% url 'inventory:equipment_qr_png' object.pk %}" alt="QR">
                <div class="pk">ID {{ object.pk }}</div>
            </div>
            <div>
                <div class="org">{{ object.organization }}</div>
                <div class="t2">{{ object.equipment_type|default:object.name }}</div>
                <div class="t2 muted">
                    {{ object.name|default:"" }}
                </div>
                <div class="inv">
                    Инв. № {{ object.inventory_number|default:"—" }}
                </div>

            </div>
        </div>
    {% empty %}
        <div style="font-size:12px;">Нет выбранного оборудования</div>
    {% endfor %}
</div>
<script>
    window.addEventListener("load", function () {
        window.print();
    });
</script>
</body>
</html>
